version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: betfair_agent
    ports:
      - '5434:5432'
    volumes:
      - pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6381:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agent:agent@postgres:5432/betfair_agent
      REDIS_URL: redis://redis:6379
      API_PORT: 4001
    depends_on:
      - postgres
      - redis
    ports:
      - '4001:4001'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - '4010:4010'

volumes:
  pg:
